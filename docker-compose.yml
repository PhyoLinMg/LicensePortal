services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-license_server}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-license_server}"]
      interval: 5s
      timeout: 5s
      retries: 10

  portal-ui:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-license_server}
      KEK_BASE64: ${KEK_BASE64}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      PROXY_UPSTREAM_URL: ${PROXY_UPSTREAM_URL:-}
      PROXY_BYPASS_PREFIXES: ${PROXY_BYPASS_PREFIXES:-}
    ports:
      - "3001:3001"
    networks:
      - db
      - web
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/login || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

networks:
  db:
    internal: true
  web:

volumes:
  pgdata:
